# -*- coding: utf-8 -*-
data_dir: '/home/gary/CloudPointProcessing/k603路演/'  # 数据根目录
result_dir: '/mnt/c/Users/Gary/Desktop/report/视频录制/'  # 报告保存目录
comp_pair:
  - 'DJI_202601271413_009_清云湛江方向-K603-562-632-点云-实验0127非重复'
  - 'DJI_202601271548_012_清云湛江方向-K603-562-632-点云-实验0127非重复填土'

epsg_code: 4547  # CGCS2000 / 3-degree Gauss-Kruger CM 114E 把CSF地面点转换为PC对象时使用的坐标系

data_types:  # 以后可能有更多数据形态
  - 'las'
  - 'csf_ground'
  - 'offground'
wanted_ground: 'csf_ground'  # 部分配准算法和看板中希望以哪个地面点形态作为基准

use_seg_slope: true  # 是否分割管辖区
seg_idx: 0  # 所分割的管辖区ID
coord_json: '/home/gary/point-cloud-3d/output/管辖区坐标/k603路演/K603-562-632_地理坐标.json'  # 管辖区的json文件

icp:  # 配准算法参数
  to_register: true
  icp_method: 'point_to_point'
  max_correspondence_distance: 0.1
  max_iteration: 200

rasterization:  # 点云转图像参数
  sampling_rate: 3000
  sampling_mode: 'average'
  reverse: true

csf: # CSF地面点提取算法参数，这里的超参名要与形参名保持一致
  bSloopSmooth: false
  time_step: 0.5
  class_threshold: 0.01  # 影响最终地面点的“厚度”
  cloth_resolution: 0.05 # 布料网格大小也会间接影响布料的软硬
  rigidness: 1  # 最小值，布料最柔软，适合陡峭边坡
  interation: 500

block_size: 1.0
use_cache: false
cache_dir: '/home/gary/cache/'

analysis: 'grid_diff'
with_dashboard: true

grid_diff:
  metrics:
    - '高程平均值'
    - '密度'
    # - '高程标准差'
  masks:  # 可选写，不写就全都不生成掩码
    高程平均值: true
    密度: true
    # 高程标准差: false
  spline_fit: false
  fit_thres: 1.0
  quantiles:
    - 0.02  # 任意个 p∈(0,1)
  abs_diff: false  # 是否取差异绝对值
  use_masks: true  # 是否应用蒙版，False时只有高程掩码
  density_thres: 10  # 网格点数量低于阈值则滤除，可能要根据网格大小调整
  plant_thres: 1.0  # 植被掩码
  use_morphology: true  # 是否对高程掩码做膨胀腐蚀
  erosion_size: 1  # 腐蚀结构元大小：0.1m -> 4; 1m -> 1
  show_fig: true

m3c2:
  based_cloud: 'csf_ground'
  min_dist_between_points: 0.05  # 设置为两倍projection_radius，则圆柱形刚好不会互相覆盖
  projection_radius: 0.1
  projection_half_depth: 0.15
  use_median: false
  progressive_search: false
  progressive_steps: 3
  only_positive_dir: false
  min_points_for_stats: 5
  confidence_level: 3.291
  registration_rms: 0.0

save: false  # 是否保存报告